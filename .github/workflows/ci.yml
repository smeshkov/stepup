name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

env:
  CUSTOM_GCL_VERSION: v0.0.5  # pin to a release tag

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: go mod download

      - name: Check format
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted. Run 'make fmt'."
            gofmt -d .
            exit 1
          fi

      - name: Vet
        run: make vet

      # - name: golangci-lint
      #   uses: golangci/golangci-lint-action@v9      
      
      - name: Download custom-gcl
        run: |
          curl -sL "https://github.com/smeshkov/golangci-lint-plugins/releases/download/${CUSTOM_GCL_VERSION}/custom-gcl-linux-amd64.tar.gz" | tar xz
          chmod +x custom-gcl

      - run: ./custom-gcl run ./...

      # - name: Build
      #   run: make build

      - name: Test
        run: make test
